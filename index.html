<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Africa Vision — Synthèse des Activités</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --navy:#152238;
    --navy-2:#1e3252;
    --gold:#E8A33D;
    --gold-dark:#c8842a;
    --teal:#2C7A7B;
    --paper:#F6F4EF;
    --ink:#20242c;
    --line:#dcd6c8;
    --danger:#b5473a;
    --ok:#2f7d5a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
  }
  h1,h2,h3,.brand{font-family:'Space Grotesk',sans-serif;}

  /* ---- Topbar ---- */
  .topbar{
    background:var(--navy);
    color:#fff;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;top:0;z-index:20;
    border-bottom:3px solid var(--gold);
  }
  .brand{font-weight:700;font-size:1.05rem;letter-spacing:.3px;display:flex;align-items:center;gap:10px;}
  .brand .mark{
    width:34px;height:34px;border-radius:50%;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    background:#fff;
  }
  .brand .mark img{ width:100%;height:100%;object-fit:contain; }
  .who{font-size:.8rem;opacity:.85;}
  .logout{
    background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;
    padding:6px 12px;border-radius:6px;font-size:.8rem;cursor:pointer;
  }
  .logout:hover{background:rgba(255,255,255,.12);}

  .wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px;}

  /* ---- Login ---- */
  .login-shell{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:
      radial-gradient(circle at 15% 20%, rgba(232,163,61,.15), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(44,122,123,.18), transparent 45%),
      var(--navy);
  }
  .login-card{
    background:var(--paper);
    border-radius:14px;
    padding:34px 28px;
    width:100%;max-width:380px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
  }
  .login-card h1{margin:0 0 4px;font-size:1.4rem;color:var(--navy);}
  .login-card p.sub{margin:0 0 22px;color:#6b6455;font-size:.88rem;}
  label{display:block;font-size:.78rem;font-weight:600;color:#585148;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px;}
  select, input[type=text], input[type=password], input[type=date], input[type=number], textarea{
    width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;
    font-family:'Inter',sans-serif;font-size:.95rem;background:#fff;color:var(--ink);
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold);}
  textarea{resize:vertical;min-height:80px;}
  .btn{
    display:inline-block;border:none;border-radius:8px;padding:11px 18px;
    font-family:'Inter',sans-serif;font-weight:600;font-size:.92rem;cursor:pointer;
    transition:transform .08s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--gold);color:var(--navy);width:100%;margin-top:20px;}
  .btn-primary:hover{background:var(--gold-dark);}
  .btn-secondary{background:transparent;border:1.5px solid var(--navy);color:var(--navy);}
  .btn-teal{background:var(--teal);color:#fff;}
  .btn-ghost{background:transparent;color:var(--teal);text-decoration:underline;padding:4px;font-weight:500;}
  .err{color:var(--danger);font-size:.82rem;margin-top:10px;min-height:1em;}
  .login-footer{margin-top:16px;text-align:center;}

  /* ---- Cards / sections ---- */
  .card{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:20px;margin-bottom:18px;
  }
  .card h2{margin:0 0 4px;font-size:1.05rem;color:var(--navy);}
  .card .hint{color:#8a8272;font-size:.82rem;margin:0 0 16px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:560px){.grid2{grid-template-columns:1fr;}}

  .service-tag{
    display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.4px;
    text-transform:uppercase;padding:3px 9px;border-radius:20px;
    background:var(--navy-2);color:#fff;
  }
  .tag-cargo-envoi{background:#1e3252;}
  .tag-cargo-reception{background:#4a3a6b;}
  .tag-billeterie{background:#2C7A7B;}

  /* stamp signature element */
  .stamp{
    display:inline-flex;align-items:center;gap:6px;
    border:2px dashed var(--ok);color:var(--ok);
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.7rem;
    text-transform:uppercase;letter-spacing:.6px;
    padding:4px 10px;border-radius:30px;
    transform:rotate(-3deg);
  }
  .stamp.pending{border-color:#a89a6e;color:#8a7a45;}

  .report-item{
    border-bottom:1px solid var(--line);padding:14px 0;
  }
  .report-item:last-child{border-bottom:none;}
  .report-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
  .report-date{font-weight:600;color:var(--navy);font-size:.88rem;}
  .report-meta{font-size:.8rem;color:#8a8272;}
  .report-body{font-size:.9rem;line-height:1.5;white-space:pre-wrap;}
  .chips{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
  .chip{font-size:.8rem;color:#585148;background:#f0ede3;padding:3px 9px;border-radius:6px;}

  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:2px solid var(--line);}
  .tab{padding:9px 14px;font-size:.88rem;font-weight:600;color:#8a8272;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;}
  .tab.active{color:var(--navy);border-bottom-color:var(--gold);}

  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
  @media(max-width:640px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:var(--navy);color:#fff;border-radius:10px;padding:14px;text-align:center;}
  .kpi .num{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--gold);}
  .kpi .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.4px;opacity:.85;margin-top:2px;}

  .synth-box{
    background:#fdfcf8;border:1.5px solid var(--gold);border-radius:10px;
    padding:18px;font-size:.9rem;line-height:1.6;white-space:pre-wrap;font-family:'Inter',monospace;
  }
  .actions-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
  .empty{color:#a89a6e;font-size:.88rem;font-style:italic;padding:10px 0;}
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;
    font-size:.85rem;box-shadow:0 8px 20px rgba(0,0,0,.3);z-index:50;opacity:0;
    transition:opacity .25s ease;pointer-events:none;
  }
  .toast.show{opacity:1;}
  @media print{
    .topbar,.tabs,.no-print{display:none !important;}
    body{background:#fff;}
  }
</style>
</head>

/* ---- Conversion JS <-> format Firestore REST ---- */
function toFirestoreValue(v){
  if(v===null || v===undefined) return {nullValue:null};
  if(typeof v==='string') return {stringValue:v};
  if(typeof v==='boolean') return {booleanValue:v};
  if(typeof v==='number') return Number.isInteger(v) ? {integerValue:String(v)} : {doubleValue:v};
  if(Array.isArray(v)) return {arrayValue:{values:v.map(toFirestoreValue)}};
  if(typeof v==='object') return {mapValue:{fields: toFirestoreFieldsRaw(v)}};
  return {stringValue:String(v)};
}
function toFirestoreFieldsRaw(obj){
  const fields={};
  Object.keys(obj).forEach(k=>{ fields[k]=toFirestoreValue(obj[k]); });
  return fields;
}
function toFirestoreDoc(obj){ return {fields: toFirestoreFieldsRaw(obj)}; }

function fromFirestoreValue(v){
  if(!v) return null;
  if('stringValue' in v) return v.stringValue;
  if('integerValue' in v) return Number(v.integerValue);
  if('doubleValue' in v) return Number(v.doubleValue);
  if('booleanValue' in v) return v.booleanValue;
  if('nullValue' in v) return null;
  if('mapValue' in v) return fromFirestoreFieldsRaw((v.mapValue&&v.mapValue.fields)||{});
  if('arrayValue' in v) return ((v.arrayValue&&v.arrayValue.values)||[]).map(fromFirestoreValue);
  return null;
}
function fromFirestoreFieldsRaw(fields){
  const obj={};
  Object.keys(fields||{}).forEach(k=>{ obj[k]=fromFirestoreValue(fields[k]); });
  return obj;
}
function fromFirestoreDoc(doc){ return fromFirestoreFieldsRaw(doc.fields||{}); }

  cargo_envoi:     { name:"Chef Cargo Envoi",     pass:"1234" },
  cargo_reception: { name:"Chef Cargo Réception", pass:"1234" },
  billeterie:      { name:"Chef Billeterie",      pass:"1234" },

async function loadUsers(){
  try{
    const res = await fetch(`${FIRESTORE_BASE}/${COL_CONFIG}/users`);
    if(res.status===200){
      const doc = await res.json();
      state.users = fromFirestoreDoc(doc);
      if(!state.users || Object.keys(state.users).length===0) throw new Error('empty');
    } else {
      throw new Error('not found');
    }
  }catch(e){
    state.users = DEFAULT_USERS;
    await saveUsers();
    return;
  }
  // Migration : ajoute les comptes des nouveaux services s'ils n'existent pas encore
  let changed = false;
  Object.keys(DEFAULT_USERS).forEach(k=>{
    if(!state.users[k]){ state.users[k] = DEFAULT_USERS[k]; changed = true; }
  });
  // Met à jour le nom du DGA
  if(state.users.dga && state.users.dga.name !== "BAH SOULEYMANE DT"){
    state.users.dga.name = "BAH SOULEYMANE DT";
    changed = true;
  }
  if(changed) await saveUsers();
}

async function loadReports(){
  try{
    const res = await fetch(`${FIRESTORE_BASE}/${COL_REPORTS}?pageSize=300`);
    const data = await res.json();
    const docs = data.documents || [];
    state.reports = docs.map(d=>{
      const obj = fromFirestoreDoc(d);
      const parts = d.name.split('/');
      obj.id = parts[parts.length-1];
      return obj;
    });
  }catch(e){
    state.reports = [];
    showToast("⚠ Connexion à la base impossible — vérifiez votre connexion internet.");
  }
}

async function saveReport(report){
  await fetch(`${FIRESTORE_BASE}/${COL_REPORTS}/${report.id}`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(toFirestoreDoc(report))
  });
}

async function loadDgaExpenses(){
  try{
    const res = await fetch(`${FIRESTORE_BASE}/${COL_DGA_EXPENSES}?pageSize=300`);
    const data = await res.json();
    const docs = data.documents || [];
    state.dgaExpenses = docs.map(d=>{
      const obj = fromFirestoreDoc(d);
      const parts = d.name.split('/');
      obj.id = parts[parts.length-1];
      return obj;
    });
  }catch(e){
    state.dgaExpenses = [];
  }
}

async function saveDgaExpense(expense){
  await fetch(`${FIRESTORE_BASE}/${COL_DGA_EXPENSES}/${expense.id}`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(toFirestoreDoc(expense))
  });
}

async function deleteDgaExpense(id){
  await fetch(`${FIRESTORE_BASE}/${COL_DGA_EXPENSES}/${id}`, { method:'DELETE' });
  state.dgaExpenses = state.dgaExpenses.filter(e=>e.id!==id);

function compressImageFile(file, maxWidth, quality){
  maxWidth = maxWidth || 1000;
  quality = quality || 0.6;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxWidth){ h = Math.round(h * maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=>reject(new Error('image invalide'));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error('lecture impossible'));
    reader.readAsDataURL(file);
  });
}

async function fetchSignatureDoc(docId){

    const res = await fetch(`${FIRESTORE_BASE}/${COL_CONFIG}/${docId}`);

      const sig = fromFirestoreDoc(doc);
      return (sig && sig.image) ? sig : null;
    }
  }catch(e){ /* ignore */ }
  return null;
}

function setupDocumentForm(serviceKey){
  const photoInput = document.getElementById('doc_photo');
  const docForm = document.getElementById('docForm');
  if(!photoInput || !docForm) return;

  let compressedImage = null;

  photoInput.onchange = async ()=>{
    const file = photoInput.files[0];
    if(!file) return;
    try{
      compressedImage = await compressImageFile(file);
      const wrap = document.getElementById('docPreviewWrap');
      const img = document.getElementById('docPreview');
      img.src = compressedImage;
      wrap.style.display = 'block';
    }catch(e){
      showToast("⚠ Impossible de lire cette image.");
    }
  };

  docForm.onsubmit = async (e)=>{
    e.preventDefault();
    if(!compressedImage){ showToast("⚠ Ajoutez d'abord une photo du document."); return; }
    const type = document.getElementById('doc_type').value;
    const montant = document.getElementById('doc_montant').value || 0;
    const description = document.getElementById('doc_description').value.trim();
    const date = document.getElementById('doc_date').value || todayISO();
    if(Number(montant)<=0 || !description){ showToast("⚠ Renseignez le montant et la description."); return; }

    const doc = {
      id: uid(),
      service: serviceKey,
      chef: state.session.name,
      type, montant: Number(montant), description, date,
      image: compressedImage,
      createdAt: Date.now()
    };
    state.documents.push(doc);
    const btn = docForm.querySelector('button[type=submit]');
    if(btn){ btn.disabled = true; btn.textContent = "Enregistrement..."; }
    try{
      await saveDocument(doc);
      showToast("Justificatif enregistré ✓");
    }catch(err){
      showToast("⚠ Échec de l'enregistrement — vérifiez votre connexion internet.");
    }
    render();
  };
}

function setupChefSignaturePad(){
  const canvas = document.getElementById('sigCanvasChef');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#152238';
  let drawing = false, last = null, hasDrawn = false;

  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx-rect.left) * (canvas.width/rect.width), y: (cy-rect.top) * (canvas.height/rect.height) };
  }
  function start(e){ drawing = true; last = pos(e); e.preventDefault(); }
  function move(e){
    if(!drawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last = p; hasDrawn = true;
    e.preventDefault();
  }
  function end(){ drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);

  const clearBtn = document.getElementById('clearSigBtnChef');
  if(clearBtn) clearBtn.onclick = ()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); hasDrawn = false; };

  const saveBtn = document.getElementById('saveSigBtnChef');
  if(saveBtn) saveBtn.onclick = async ()=>{
    if(!hasDrawn){ showToast("⚠ Dessinez d'abord votre signature."); return; }
    const sig = { image: canvas.toDataURL('image/png'), name: state.session.name, date: todayISO() };
    state.chefSignature = sig;
    saveBtn.disabled = true; saveBtn.textContent = "Enregistrement...";
    try{
      await saveChefSignature(state.session.service, sig);
      showToast("Signature enregistrée ✓");
    }catch(err){
      showToast("⚠ Échec de l'enregistrement de la signature.");
    }
    render();
  };
}

function getOpType(e){
  // Compatibilité : les opérations créées avant l'ajout des types étaient des dépenses par défaut
  return e.type || 'depense';
}

function getServiceInfo(key){
  if(key==='dga') return { label:"Direction (Général)", tag:"tag-cargo-reception" };
  return SERVICES[key] || { label: key || "Service inconnu", tag:"" };
}

function filteredReports(){
  return state.reports.filter(r=>{
    if(!SERVICES[r.service]) return false; // ignore les anciens rapports de test avec des services renommés/supprimés
    if(state.filterService!=='all' && r.service!==state.filterService) return false;
    if(state.filterFrom && r.date < state.filterFrom) return false;
    if(state.filterTo && r.date > state.filterTo) return false;
    return true;
  }).sort((a,b)=> b.date.localeCompare(a.date));
}

function filteredDgaExpenses(){
  return state.dgaExpenses.filter(e=>{
    if(state.filterFrom && e.date < state.filterFrom) return false;
    if(state.filterTo && e.date > state.filterTo) return false;
    return true;
  }).sort((a,b)=> b.date.localeCompare(a.date));
}

function filteredDocuments(){
  return state.documents.filter(d=>{
    if(state.filterService!=='all' && d.service!==state.filterService) return false;
    if(state.filterDocType!=='all' && d.type!==state.filterDocType) return false;
    if(state.filterFrom && d.date < state.filterFrom) return false;
    if(state.filterTo && d.date > state.filterTo) return false;
    return true;
  }).sort((a,b)=> b.date.localeCompare(a.date));
}

            <span class="chip" style="font-weight:700;">📊 Net : ${net.toLocaleString('fr-FR')} GNF</span>
            <span class="chip">👥 ${r.clients||0} clients</span>
            ${r.problemes ? `<span class="chip" style="color:#b5473a;">⚠ ${escapeHtml(r.problemes)}</span>` : ''}
          </div>
        </div>
      `;}).join('')
    }
  </div>`;
}

function renderSyntheseTab(list, dgaExp, totalCA, totalDepensesServices, totalDepensesDga, totalRecusDga, totalDepenses, totalNet, totalClients, problemesCount, isPatron){
  const from = state.filterFrom || (list.length?list[list.length-1].date:todayISO());
  const to = state.filterTo || todayISO();

  const byService = {};
  Object.keys(SERVICES).forEach(k=>byService[k]=[]);
  list.forEach(r=>byService[r.service].push(r));

  let text = `SYNTHÈSE D'ACTIVITÉS — AFRICA VISION MULTISERVICES\n`;
  text += `Période : ${fmtDate(from)} au ${fmtDate(to)}\n`;
  text += `Préparé par : ${state.session.name} (DGA)\n`;
  text += `\n— — — — — — — — — — — — —\n\n`;
  text += `CHIFFRE D'AFFAIRES BRUT : ${totalCA.toLocaleString('fr-FR')} GNF (dont ${totalRecusDga.toLocaleString('fr-FR')} GNF reçus directement par le DGA)\n`;
  text += `DÉPENSES DES SERVICES : ${totalDepensesServices.toLocaleString('fr-FR')} GNF\n`;
  text += `DÉPENSES GÉNÉRALES (DGA) : ${totalDepensesDga.toLocaleString('fr-FR')} GNF\n`;
  text += `DÉPENSES TOTALES : ${totalDepenses.toLocaleString('fr-FR')} GNF\n`;
  text += `CHIFFRE D'AFFAIRES NET : ${totalNet.toLocaleString('fr-FR')} GNF\n`;
  text += `CLIENTS SERVIS AU TOTAL : ${totalClients}\n`;
  text += `NOMBRE DE RAPPORTS REÇUS : ${list.length}\n`;
  text += `POINTS D'ATTENTION SIGNALÉS : ${problemesCount}\n\n`;

  Object.keys(SERVICES).forEach(k=>{
    const items = byService[k];
    const svcCA = items.reduce((s,r)=>s+Number(r.ca||0),0);
    const svcDepenses = items.reduce((s,r)=>s+Number(r.depenses||0),0);
    const svcNet = svcCA - svcDepenses;
    const svcClients = items.reduce((s,r)=>s+Number(r.clients||0),0);
    text += `— — — — — — — — — — — — —\n`;
    text += `${SERVICES[k].label.toUpperCase()}\n`;
    if(items.length===0){
      text += `Aucun rapport reçu sur la période.\n\n`;
      return;
    }
    text += `CA brut : ${svcCA.toLocaleString('fr-FR')} GNF | Dépenses : ${svcDepenses.toLocaleString('fr-FR')} GNF | Net : ${svcNet.toLocaleString('fr-FR')} GNF | Clients : ${svcClients}\n\n`;
    items.sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
      text += `• ${fmtDate(r.date)} : ${r.activites}\n`;
      if(r.depenses) text += `  💸 Dépense (${r.motifDepenses||'motif non précisé'}) : ${Number(r.depenses).toLocaleString('fr-FR')} GNF\n`;
      if(r.problemes) text += `  ⚠ Problème : ${r.problemes}\n`;
    });
    const svcSig = state.allChefSignatures[k];
    text += svcSig ? `Signé par : ${svcSig.name} (${SERVICES[k].label})\n\n` : `Non signé par le chef de service\n\n`;
  });

  text += `— — — — — — — — — — — — —\n`;
  text += `OPÉRATIONS GÉNÉRALES (DGA)\n`;
  if(dgaExp.length===0){
    text += `Aucune opération générale sur la période.\n\n`;
  } else {
    dgaExp.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
      const icone = getOpType(e)==='recu' ? '💰 Reçu' : (getOpType(e)==='depot' ? '🔄 Dépôt interne (non compté dans le CA)' : '💸 Dépense');
      text += `• ${fmtDate(e.date)} : [${icone}] ${e.motif} — ${Number(e.montant||0).toLocaleString('fr-FR')} GNF\n`;
    });
    text += `\n`;
  }

  text += `— — — — — — — — — — — — —\n`;
  text += `Signé par : ${state.session.name} (DGA)\n`;
  text += `Date : ${fmtDate(todayISO())}\n`;

  lastSynthesisText = text;

  /* ---- Aperçu visuel riche (avec signatures) pour l'écran et l'impression ---- */
  let previewHtml = `
    <div style="margin-bottom:16px;">
      <div style="font-weight:700;color:var(--navy);">CHIFFRE D'AFFAIRES BRUT : ${totalCA.toLocaleString('fr-FR')} GNF</div>
      <div style="font-size:.82rem;color:#8a8272;">(dont ${totalRecusDga.toLocaleString('fr-FR')} GNF reçus directement par le DGA)</div>
      <div>Dépenses des services : ${totalDepensesServices.toLocaleString('fr-FR')} GNF</div>
      <div>Dépenses générales (DGA) : ${totalDepensesDga.toLocaleString('fr-FR')} GNF</div>
      <div style="font-weight:700;">Dépenses totales : ${totalDepenses.toLocaleString('fr-FR')} GNF</div>
      <div style="font-weight:700;color:var(--teal);">CHIFFRE D'AFFAIRES NET : ${totalNet.toLocaleString('fr-FR')} GNF</div>
      <div>Clients servis au total : ${totalClients} · Rapports reçus : ${list.length} · Points d'attention : ${problemesCount}</div>
    </div>`;

  Object.keys(SERVICES).forEach(k=>{
    const items = byService[k].slice().sort((a,b)=>a.date.localeCompare(b.date));
    const svcCA = items.reduce((s,r)=>s+Number(r.ca||0),0);
    const svcDepenses = items.reduce((s,r)=>s+Number(r.depenses||0),0);
    const svcNet = svcCA - svcDepenses;
    const svcClients = items.reduce((s,r)=>s+Number(r.clients||0),0);
    const svcSig = state.allChefSignatures[k];

    previewHtml += `<div style="border-top:2px solid var(--line);padding:14px 0;">`;
    previewHtml += `<div class="service-tag ${SERVICES[k].tag}" style="margin-bottom:6px;">${SERVICES[k].label}</div>`;
    if(items.length===0){
      previewHtml += `<p class="empty" style="margin:4px 0 0;">Aucun rapport reçu sur la période.</p></div>`;
      return;
    }
    previewHtml += `<div style="font-size:.85rem;color:#585148;margin-bottom:8px;">CA brut : <strong>${svcCA.toLocaleString('fr-FR')} GNF</strong> | Dépenses : <strong>${svcDepenses.toLocaleString('fr-FR')} GNF</strong> | Net : <strong>${svcNet.toLocaleString('fr-FR')} GNF</strong> | Clients : <strong>${svcClients}</strong></div>`;
    items.forEach(r=>{
      previewHtml += `<div style="font-size:.85rem;margin-bottom:4px;">• ${fmtDate(r.date)} : ${escapeHtml(r.activites)}</div>`;
      if(r.depenses) previewHtml += `<div style="font-size:.8rem;color:#8a7a45;margin-left:12px;">💸 Dépense (${escapeHtml(r.motifDepenses||'motif non précisé')}) : ${Number(r.depenses).toLocaleString('fr-FR')} GNF</div>`;
      if(r.problemes) previewHtml += `<div style="font-size:.8rem;color:#b5473a;margin-left:12px;">⚠ ${escapeHtml(r.problemes)}</div>`;
    });
    previewHtml += `<div style="display:flex;justify-content:flex-end;margin-top:10px;">`;
    if(svcSig){
      previewHtml += `
        <div style="text-align:center;">
          <img src="${svcSig.image}" alt="Signature ${escapeHtml(SERVICES[k].label)}" style="max-width:160px;max-height:70px;display:block;margin:0 auto;">
          <div style="font-size:.72rem;color:#8a8272;border-top:1px solid var(--line);padding-top:3px;margin-top:2px;">${escapeHtml(svcSig.name)} — ${fmtDate(svcSig.date)}</div>
        </div>`;
    } else {
      previewHtml += `<div class="stamp pending" style="transform:none;">Non signé</div>`;
    }
    previewHtml += `</div></div>`;
  });

  previewHtml += `<div style="border-top:2px solid var(--line);padding:14px 0;">`;
  previewHtml += `<div style="font-weight:700;color:var(--navy);margin-bottom:6px;">OPÉRATIONS GÉNÉRALES (DGA)</div>`;
  if(dgaExp.length===0){
    previewHtml += `<p class="empty" style="margin:4px 0 0;">Aucune opération générale sur la période.</p>`;
  } else {
    dgaExp.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
      const icon = getOpType(e)==='recu' ? '💰' : (getOpType(e)==='depot' ? '🔄' : '💸');
      const color = getOpType(e)==='recu' ? 'var(--ok)' : (getOpType(e)==='depot' ? 'var(--teal)' : '#8a7a45');
      const suffix = getOpType(e)==='depot' ? ' <span style="font-style:italic;color:#8a8272;">(non compté dans le CA)</span>' : '';
      previewHtml += `<div style="font-size:.85rem;margin-bottom:4px;color:${color};">${icon} ${fmtDate(e.date)} : ${escapeHtml(e.motif)} — <strong>${Number(e.montant||0).toLocaleString('fr-FR')} GNF</strong>${suffix}</div>`;
    });
  }
  previewHtml += `</div>`;

  const activeFilterParts = [];
  if(state.filterService !== 'all') activeFilterParts.push(`Service : <strong>${getServiceInfo(state.filterService).label}</strong>`);
  if(state.filterFrom) activeFilterParts.push(`Depuis le <strong>${fmtDate(state.filterFrom)}</strong>`);
  if(state.filterTo) activeFilterParts.push(`Jusqu'au <strong>${fmtDate(state.filterTo)}</strong>`);
  const hasFilter = activeFilterParts.length > 0;

  return `
  <div class="card no-print">
    <h2>Période de la synthèse</h2>
    ${hasFilter ? `<p class="hint" style="color:var(--danger);">⚠ Filtre(s) actif(s) : ${activeFilterParts.join(' · ')}. La synthèse ne couvre pas forcément toute l'activité passée.</p>` : `<p class="hint">La synthèse couvre toute l'activité enregistrée, depuis le début.</p>`}
    <div class="grid2">
      <div>
        <label>Du</label>
        <input type="date" id="filtFromSynth" value="${state.filterFrom||''}">
      </div>
      <div>
        <label>Au</label>
        <input type="date" id="filtToSynth" value="${state.filterTo||''}">
      </div>
    </div>
    ${hasFilter ? `<button class="btn btn-secondary" id="resetSynthFilterBtn" type="button" style="margin-top:10px;">Afficher toute la période</button>` : ''}
  </div>
  <div class="card no-print">
    <h2>Générer la synthèse</h2>
    <p class="hint">Période du ${fmtDate(from)} au ${fmtDate(to)}.</p>
    <div class="actions-row">
      <button class="btn btn-teal" id="copyBtn">📋 Copier (pour WhatsApp)</button>
      <button class="btn btn-secondary" id="printBtn">🖨️ Imprimer / PDF</button>
    </div>
  </div>
  <div class="card">
    <h2>Aperçu</h2>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:2px solid var(--gold);">
      <img src="${LOGO_DATA_URI}" alt="Africa Vision" style="width:52px;height:52px;object-fit:contain;flex-shrink:0;">
      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--navy);font-size:1.05rem;line-height:1.2;">AFRICA VISION MULTISERVICES</div>
        <div style="font-size:.78rem;color:#8a8272;">Synthèse d'activités — Conakry, Guinée</div>
      </div>
    </div>
    <div class="synth-box" id="synthText" style="white-space:normal;">${previewHtml}</div>
  </div>
  ${renderSignatureCard(isPatron)}`;
}

function renderSignatureCard(isPatron){
  if(state.dgaSignature && state.dgaSignature.image){
    return `
    <div class="card">
      <h2>Signature du DGA</h2>
      <div style="border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff;display:inline-block;">
        <img src="${state.dgaSignature.image}" alt="Signature" style="max-width:220px;display:block;">
      </div>
      <p class="hint" style="margin-top:8px;">${escapeHtml(state.dgaSignature.name)} — signé le ${fmtDate(state.dgaSignature.date)}</p>
      ${isPatron ? '' : `<button class="btn btn-secondary no-print" id="redoSigBtn" type="button" style="margin-top:8px;">Refaire la signature</button>`}
    </div>`;
  }
  if(isPatron){
    return `
    <div class="card">
      <h2>Signature du DGA</h2>
      <p class="hint">Le DGA n'a pas encore enregistré sa signature.</p>
    </div>`;
  }
  return `
  <div class="card no-print">
    <h2>Signature du DGA</h2>
    <p class="hint">Dessinez votre signature avec le doigt (ou la souris) — elle sera intégrée automatiquement à chaque synthèse imprimée.</p>
    <canvas id="sigCanvas" width="320" height="140" style="border:1.5px solid var(--line);border-radius:8px;background:#fff;touch-action:none;width:100%;max-width:320px;display:block;"></canvas>
    <div class="actions-row">
      <button class="btn btn-secondary" id="clearSigBtn" type="button">Effacer</button>
      <button class="btn btn-primary" id="saveSigBtn" type="button">Enregistrer la signature</button>
    </div>
  </div>`;
}

function attachDgaEvents(){
  document.getElementById('logoutBtn').onclick = ()=>{ state.session=null; state.screen='login'; render(); };
  document.getElementById('refreshBtn').onclick = async ()=>{
    showToast("Actualisation...");
    await loadReports();
    await loadDgaExpenses();
    await loadDgaSignature();
    await loadAllChefSignatures();
    await loadDocuments();
    await loadSituations();
    render();
    showToast("Données à jour ✓");
  };
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{ state.dgaTab = t.dataset.tab; render(); };
  });

  const resetBtn = document.getElementById('resetAllBtn');
  if(resetBtn) resetBtn.onclick = async ()=>{
    const confirm1 = confirm("Voulez-vous vraiment supprimer TOUS les rapports et dépenses ? Cette action est irréversible.");
    if(!confirm1) return;
    const confirm2 = confirm("Dernière confirmation : toutes les données seront définitivement perdues. Continuer ?");
    if(!confirm2) return;
    resetBtn.disabled = true; resetBtn.textContent = "Suppression en cours...";
    try{
      await resetAllData();
      showToast("Toutes les données ont été réinitialisées ✓");
    }catch(err){
      showToast("⚠ Erreur pendant la réinitialisation.");
    }
    render();
  };

  const fs = document.getElementById('filtService');
  const ff = document.getElementById('filtFrom');
  const ft = document.getElementById('filtTo');
  if(fs) fs.onchange = ()=>{ state.filterService = fs.value; render(); };
  if(ff) ff.onchange = ()=>{ state.filterFrom = ff.value || null; render(); };
  if(ft) ft.onchange = ()=>{ state.filterTo = ft.value || null; render(); };

  const dgaForm = document.getElementById('dgaExpenseForm');
  if(dgaForm) dgaForm.onsubmit = async (e)=>{
    e.preventDefault();
    const type = document.getElementById('d_type').value;
    const motif = document.getElementById('d_motif').value.trim();
    const montant = document.getElementById('d_montant').value || 0;
    if(!motif || Number(montant)<=0){ showToast("⚠ Indiquez un motif et un montant."); return; }
    const expense = { id: uid(), type, motif, montant: Number(montant), date: todayISO(), createdAt: Date.now() };
    state.dgaExpenses.push(expense);
    const btn = dgaForm.querySelector('button[type=submit]');
    if(btn){ btn.disabled = true; btn.textContent = "Enregistrement..."; }
    try{
      await saveDgaExpense(expense);
      showToast(type==='recu' ? "Encaissement enregistré ✓" : "Dépense enregistrée ✓");
    }catch(err){
      showToast("⚠ Échec de l'enregistrement — vérifiez votre connexion internet.");
    }
    render();
  };

  const ffo = document.getElementById('filtFromOps');
  const fto = document.getElementById('filtToOps');
  if(ffo) ffo.onchange = ()=>{ state.filterFrom = ffo.value || null; render(); };
  if(fto) fto.onchange = ()=>{ state.filterTo = fto.value || null; render(); };
  const resetOpsBtn = document.getElementById('resetOpsFilterBtn');
  if(resetOpsBtn) resetOpsBtn.onclick = ()=>{ state.filterFrom = null; state.filterTo = null; state.filterService = 'all'; render(); };

  const resetOverviewBtn = document.getElementById('resetOverviewFilterBtn');
  if(resetOverviewBtn) resetOverviewBtn.onclick = ()=>{ state.filterFrom = null; state.filterTo = null; state.filterService = 'all'; render(); };

  const ffs = document.getElementById('filtFromSynth');
  const fts = document.getElementById('filtToSynth');
  if(ffs) ffs.onchange = ()=>{ state.filterFrom = ffs.value || null; render(); };
  if(fts) fts.onchange = ()=>{ state.filterTo = fts.value || null; render(); };
  const resetSynthBtn = document.getElementById('resetSynthFilterBtn');
  if(resetSynthBtn) resetSynthBtn.onclick = ()=>{ state.filterFrom = null; state.filterTo = null; state.filterService = 'all'; render(); };

  const copyBtn = document.getElementById('copyBtn');
  if(copyBtn) copyBtn.onclick = ()=>{
    copyTextToClipboard(lastSynthesisText);
  };
  const printBtn = document.getElementById('printBtn');
  if(printBtn) printBtn.onclick = ()=> window.print();

  const redoSigBtn = document.getElementById('redoSigBtn');
  if(redoSigBtn) redoSigBtn.onclick = ()=>{ state.dgaSignature = null; render(); };

  const fsd = document.getElementById('filtServiceDoc');
  const fdt = document.getElementById('filtDocType');
  const ffd = document.getElementById('filtFromDoc');
  const ftd = document.getElementById('filtToDoc');
  if(fsd) fsd.onchange = ()=>{ state.filterService = fsd.value; render(); };
  if(fdt) fdt.onchange = ()=>{ state.filterDocType = fdt.value; render(); };
  if(ffd) ffd.onchange = ()=>{ state.filterFrom = ffd.value || null; render(); };
  if(ftd) ftd.onchange = ()=>{ state.filterTo = ftd.value || null; render(); };

  const situationForm = document.getElementById('situationForm');
  if(situationForm) situationForm.onsubmit = async (e)=>{
    e.preventDefault();
    const texte = document.getElementById('s_texte').value.trim();
    if(!texte){ showToast("⚠ Écrivez votre note avant de publier."); return; }
    const entry = { id: uid(), texte, date: todayISO(), createdAt: Date.now() };
    state.situations.push(entry);
    const btn = situationForm.querySelector('button[type=submit]');
    if(btn){ btn.disabled = true; btn.textContent = "Publication..."; }
    try{
      await saveSituation(entry);
      showToast("Note publiée ✓");
    }catch(err){
      showToast("⚠ Échec de la publication — vérifiez votre connexion internet.");
    }
    render();
  };

  const printSituationBtn = document.getElementById('printSituationBtn');
  if(printSituationBtn) printSituationBtn.onclick = ()=> window.print();

  document.querySelectorAll('[data-del-op]').forEach(el=>{
    el.onclick = async ()=>{
      if(!confirm("Supprimer définitivement cette opération ?")) return;
      const id = el.dataset.delOp;
      try{
        await deleteDgaExpense(id);
        await loadDgaExpenses();
        showToast("Opération supprimée ✓");
      }catch(err){
        showToast("⚠ Échec de la suppression.");
      }
      render();
    };
  });
  document.querySelectorAll('[data-edit-op]').forEach(el=>{
    el.onclick = ()=>{
      const op = state.dgaExpenses.find(x=>x.id === el.dataset.editOp);
      if(op) showEditOperationModal(op);
    };
  });

  setupSignaturePad();
  setupDocumentForm('dga');
  setupDocThumbClicks();
}

function setupSignaturePad(){
  const canvas = document.getElementById('sigCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#152238';
  let drawing = false, last = null, hasDrawn = false;

  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx-rect.left) * (canvas.width/rect.width), y: (cy-rect.top) * (canvas.height/rect.height) };
  }
  function start(e){ drawing = true; last = pos(e); e.preventDefault(); }
  function move(e){
    if(!drawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last = p; hasDrawn = true;
    e.preventDefault();
  }
  function end(){ drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);

  const clearBtn = document.getElementById('clearSigBtn');
  if(clearBtn) clearBtn.onclick = ()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); hasDrawn = false; };

  const saveBtn = document.getElementById('saveSigBtn');
  if(saveBtn) saveBtn.onclick = async ()=>{
    if(!hasDrawn){ showToast("⚠ Dessinez d'abord votre signature."); return; }
    const sig = { image: canvas.toDataURL('image/png'), name: state.session.name, date: todayISO() };
    state.dgaSignature = sig;
    saveBtn.disabled = true; saveBtn.textContent = "Enregistrement...";
    try{
      await saveDgaSignature(sig);
      showToast("Signature enregistrée ✓");
    }catch(err){
      showToast("⚠ Échec de l'enregistrement de la signature.");
    }
    render();
  };
}

function copyTextToClipboard(txt){
  // Méthode moderne (fonctionne seulement en contexte sécurisé HTTPS)
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(txt)
      .then(()=>showToast("Synthèse copiée — collez-la dans WhatsApp"))
      .catch(()=>fallbackCopy(txt));
    return;
  }
  fallbackCopy(txt);
}

function fallbackCopy(txt){
  // Méthode de secours pour fichier ouvert localement (file:// ou content://)
  try{
    const ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if(ok){
      showToast("Synthèse copiée — collez-la dans WhatsApp");
      return;
    }
  }catch(e){ /* on tombe sur la boîte manuelle ci-dessous */ }
  showManualCopyBox(txt);
}

function showManualCopyBox(txt){
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;';
  box.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:20px;max-width:420px;width:100%;">
      <h2 style="margin:0 0 8px;color:var(--navy);font-family:'Space Grotesk',sans-serif;font-size:1rem;">Copie automatique indisponible</h2>
      <p style="font-size:.85rem;color:#585148;margin:0 0 12px;">Sélectionnez tout le texte ci-dessous puis copiez-le manuellement (appui long → Sélectionner tout → Copier).</p>
      <textarea readonly style="width:100%;height:200px;font-size:.8rem;padding:8px;border:1.5px solid var(--line);border-radius:8px;">${txt}</textarea>
      <button class="btn btn-primary" style="width:100%;margin-top:10px;" id="closeManualCopy">Fermer</button>
    </div>`;
  document.body.appendChild(box);
  const ta = box.querySelector('textarea');
  ta.focus(); ta.select();
  box.querySelector('#closeManualCopy').onclick = ()=> document.body.removeChild(box);
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

})();
